<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Parsing-Based Sentence Reordering</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}" />
  </head>
  <body class="dark with-tube-nav">
    <nav class="tube-nav">
      <div class="tube-nav-inner expandable-tabs" data-expandable-tabs>
        <a class="tube-link" data-route="/" href="{{ url_for('home') }}" aria-label="Home">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10.5L12 3l9 7.5" />
              <path d="M5 9.5V20h5v-6h4v6h5V9.5" />
            </svg>
          </span>
          <span class="tab-label">Home</span>
        </a>
        <a class="tube-link" data-route="/reorder" href="{{ url_for('reorder') }}" aria-label="Reorder">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3l4 4-4 4" />
              <path d="M3 7h18" />
              <path d="M7 21l-4-4 4-4" />
              <path d="M21 17H3" />
            </svg>
          </span>
          <span class="tab-label">Reorder</span>
        </a>
        <span class="tab-separator" aria-hidden="true"></span>
        <a class="tube-link" data-route="/history" href="{{ url_for('history') }}" aria-label="History">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 7v6l4 2" />
            </svg>
          </span>
          <span class="tab-label">History</span>
        </a>
        <a class="tube-link" data-route="/about" href="{{ url_for('about') }}" aria-label="About">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 11v5" />
              <circle cx="12" cy="8" r="1" fill="currentColor" stroke="none" />
            </svg>
          </span>
          <span class="tab-label">About</span>
        </a>
        <a class="tube-link" data-route="/examples" href="{{ url_for('examples') }}" aria-label="Examples">
          <span class="tab-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M20 22V5a2 2 0 0 0-2-2H6.5A2.5 2.5 0 0 0 4 5.5v14" />
            </svg>
          </span>
          <span class="tab-label">Examples</span>
        </a>

        <div class="auth-section">
  <div id="user-avatar" class="auth-avatar" aria-hidden="true">U</div>
  <span id="user-info"></span>
  <button id="login-btn" class="auth-btn auth-btn-primary" onclick="signInWithGoogle()">Login with Google</button>
  <button id="logout-btn" class="auth-btn" onclick="logout()" style="display:none;">Logout</button>
</div>
      </div>
    </nav>

    <main class="page-shell auth-shell">
      <section class="card auth-card reveal visible">
        <div class="section-label">Account</div>
        <h1 class="section-title auth-title">Register</h1>
        <p class="section-subtitle">Create an account to access all tool features.</p>

        {% if error %}
        <p class="error-text">{{ error }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
          <input type="hidden" name="next" value="{{ next_url }}" />

          <label class="auth-label" for="username">Username</label>
          <input class="field auth-input" id="username" name="username" type="text" autocomplete="username" required />

          <label class="auth-label" for="password">Password</label>
          <input class="field auth-input" id="password" name="password" type="password" autocomplete="new-password" required />

          <label class="auth-label" for="confirm_password">Confirm Password</label>
          <input class="field auth-input" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required />

          <button class="btn" type="submit">Create Account</button>
        </form>
      </section>
    </main>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
      <script id="firebase-config" type="application/json">{{ firebase_web_config | tojson }}</script>
    <script type="module" src="{{ url_for('static', filename='firebase-auth.js') }}"></script>
  </body>
</html>
